

services:
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: ymongodb+srv://admin:admin@cluster0.wujgjwg.mongodb.net/smart-leads?appName=Cluster0
      JWT_SECRET: change_this_in_production
      CLIENT_URL: http://localhost
      PORT: 5000

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
